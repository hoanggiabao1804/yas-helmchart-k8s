apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
    name: yas
    namespace: argocd

spec:
    generators:
        - matrix:
              generators:
                  - list:
                        elements:
                            - service: storefront-ui
                            - service: storefront-bff

                  - list:
                        elements:
                            - env: dev
                            - env: staging

    template:
        metadata:
            name: "{{service}}-{{env}}"

        spec:
            project: default

            sources:
                - repoURL: https://github.com/hoanggiabao1804/demo-lab01-devops.git
                  targetRevision: HEAD
                  path: k8s/charts/{{service}}

                  helm:
                      valueFiles:
                          - $values/{{env}}/{{service}}-values.yaml

                - repoURL: https://github.com/hoanggiabao1804/yas-gitops.git
                  targetRevision: HEAD
                  ref: values

            destination:
                server: https://kubernetes.default.svc
                namespace: "{{env}}"

            syncPolicy:
                automated:
                    prune: true
                    selfHeal: true
